server:
  port: 8080

spring:
  application:
    name: classroom-vote-system

  # H2 内嵌数据库 (开发/演示)
  datasource:
    url: jdbc:h2:mem:cvsdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Web Console (开发调试用)
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true

  # Redis 配置（抢答功能需要，无 Redis 时应用仍可启动预览现有功能）
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # 初始化数据
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

# 抢答功能 Redis 开关（安装 Redis 后设为 true 启用抢答缓存功能）
app:
  redis:
    enabled: false

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
